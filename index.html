<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Personalizer</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <div class="animated-bg"></div>
    <div class="floating-shape shape1"></div>
    <div class="floating-shape shape2"></div>
    <div class="floating-shape shape3"></div>

    <div class="main-container">
        <div class="glass-card">
            <h1>📚 Study Personalizer</h1>
            <p class="subtitle">Answer these 10 questions to get your personalized study plan.</p>

            <form action="/result" method="POST" id="quizForm">
                <div class="input-group">
                    <label for="username">Your Name</label>
                    <input type="text" id="username" name="username" placeholder="Enter your name" required>
                </div>

                <div class="progress-wrapper">
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                    <p id="progressText">0% completed</p>
                </div>

                {% for q in questions %}
                <div class="question-card question-block">
                    <h3>{{ loop.index }}. {{ q.text }}</h3>
                    <div class="options-grid">
                        {% for option in q.options %}
                        <label class="option-label">
                            <input type="radio" name="{{ q.id }}" value="{{ option }}" required>
                            <span>{{ option }}</span>
                        </label>
                        {% endfor %}
                    </div>
                </div>
                {% endfor %}

                <button type="submit" class="submit-btn">Get My Study Plan</button>
            </form>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>

</html>
